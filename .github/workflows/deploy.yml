name: Deploy static content to Pages

on:
  workflow_run:
    workflows: ["Build asciidoc"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: self-hosted
    # BEZWZGLĘDNY WARUNEK:
    # 1. Poprzedni workflow musiał zakończyć się sukcesem.
    # 2. Eventem wyzwalającym tamten workflow MUSIAŁ być push (odrzuca pull_request).
    # 3. Gałęzią docelową tamtego workflow MUSIAŁ być main.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      # Krok 1: Pobranie artefaktu
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: page
          path: ./public
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # Krok 2: Konfiguracja środowiska GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Krok 3: Przygotowanie plików z folderu ./public do wysłania
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      # Krok 4: Wdrożenie na serwery GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

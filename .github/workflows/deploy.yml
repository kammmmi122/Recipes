name: Deploy static content to Pages

# zizmor: ignore[dangerous-triggers]
on:
  workflow_run:
    workflows: ["Build asciidoc"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: self-hosted
    # PEWNY WARUNEK DLA JEDNEGO RUNNERA:
    # 1. Poprzedni build musiał zakończyć się sukcesem.
    # 2. Sprawdzamy czy SHA commitu wyzwalającego jest dokładnie taki sam (to cecha merge/push na main).
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_sha == github.sha }}

    steps:
      # Krok 1: Pobranie artefaktu
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: page
          path: ./public
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # Krok 2: Konfiguracja środowiska GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      # Krok 3: Przygotowanie plików z folderu ./public do wysłania
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./public

      # Krok 4: Wdrożenie na serwery GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

name: Build asciidoc

on:
  push:
    branches:
      - main
    # Opcjonalnie: uruchamiaj tylko, gdy zmieniają się przepisy lub skrypty
    paths:
      - 'Przepisy/**'
      - 'scripts/**'
      - '*.adoc'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: AsciiDoc Build
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Build AsciiDoc
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: page
          path: |
            *.html
            *.jpg
            static/*
            Przepisy/**/*.html
            Przepisy/**/*.jpg
          if-no-files-found: error

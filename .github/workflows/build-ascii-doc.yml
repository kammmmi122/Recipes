name: Build asciidoc

on:
  push:
    branches:
      - main
    paths:
      - "Przepisy/**"
      - "scripts/**"
      - "*.adoc"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: AsciiDoc Build
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
          clean: true
          persist-credentials: false

      # Ręcznie instalujemy LFS z flagą --force, która zmiażdży blokujący plik hooka
      - name: Setup and Force Git LFS
        run: |
          git lfs install --local --force
          git lfs update --force
          git lfs pull

      - name: Build AsciiDoc
        run: ./scripts/build.sh

      - name: Publish Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: page
          path: |
            *.html
            *.jpg
            static/*
            Przepisy/**/*.html
            Przepisy/**/*.jpg
          retention-days: 7
          if-no-files-found: error

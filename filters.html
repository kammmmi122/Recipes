<!doctype html>
<style>
  .site-header{
    max-width:1100px;margin:32px auto 8px;padding:0 20px;display:flex;flex-direction:column;gap:12px;align-items:stretch
  }
  .site-header h1{font-size:2rem;margin:0;text-align:center}
  .tabs{display:flex;gap:18px;align-items:center;justify-content:center}
  .tabs button{background:none;border:none;padding:8px 12px;border-bottom:3px solid transparent;cursor:pointer;font-weight:600;color:#3a3a3a}
  .tabs button.active{color:var(--accent,#007acc);border-color:var(--accent,#007acc)}
  .controls{display:flex;gap:12px;align-items:center;justify-content:center}
  .search-input{padding:10px 12px;border-radius:10px;border:1px solid #e6e6e6;min-width:220px}

  /* hide old lists if present */
  .collapsed{display:none}

  @media (max-width:700px){.site-header h1{font-size:1.5rem}}
</style>

<div class="site-header">
  <h1>Moje Przepisy</h1>
  <div class="tabs" role="tablist" aria-label="Filtry kategorii">
    <button data-filter="all" class="active">Wszystkie</button>
    <button data-filter="mięsne">Mięsne</button>
    <button data-filter="vege">Vege</button>
    <button data-filter="ryby">Ryby</button>
    <button data-filter="ostre">Ostre</button>
  </div>
  <div class="controls">
    <input id="search" class="search-input" type="search" placeholder="Szukaj przepisoe..." aria-label="Szukaj przepisów">
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const tabs = document.querySelectorAll('.tabs button');
  const searchInput = document.querySelector('#search');
  const cardsGrid = document.querySelector('.cards-grid');

  function getCards(){
    return cardsGrid ? Array.from(cardsGrid.querySelectorAll('.card')) : [];
  }

  let activeCategory = 'all';

  function applyFilters(){
    const q = (searchInput && searchInput.value || '').toLowerCase().trim();
    const cards = getCards();
    cards.forEach(card => {
      const text = (card.textContent || '').toLowerCase();
      const tagEl = card.querySelector('.card-tag');
      const tagText = tagEl ? (tagEl.textContent || '').toLowerCase() : '';

      const matchesSearch = q === '' || text.includes(q);
      const matchesCategory = activeCategory === 'all' || tagText.includes(activeCategory);

      if(matchesSearch && matchesCategory){
        card.style.display = '';
      } else {
        card.style.display = 'none';
      }
    });
  }

  tabs.forEach(t => t.addEventListener('click', ()=>{
    tabs.forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    activeCategory = t.getAttribute('data-filter') || 'all';
    applyFilters();
  }));

  if(searchInput){
    let debounce;
    searchInput.addEventListener('input', ()=>{
      clearTimeout(debounce);
      debounce = setTimeout(()=>applyFilters(), 120);
    });
  }

  // run once at start
  applyFilters();
});
</script>

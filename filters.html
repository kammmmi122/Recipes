<!doctype html>
<style>
  .site-header{
    max-width:1100px;
    margin:32px auto 8px;
    padding:0 20px;
    display:grid;
    grid-template-columns:1fr auto;
    gap:16px;
    align-items:center;
  }
  .site-header h1{
    font-size:2rem;
    margin:0;
    text-align:left;
  }
  .header-controls{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:flex-end;
    align-items:center;
  }
  .tabs{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:flex-end;
  }
  .tabs button{
    background:none;
    border:none;
    padding:8px 12px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    color:#3a3a3a;
    transition:background-color .2s, color .2s;
  }
  .tabs button.active,
  .tabs button:hover{
    color:var(--accent,#007acc);
    background:rgba(0,122,204,.1);
  }
  .controls{
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:flex-end;
    min-width:260px;
  }
  .search-input{
    padding:10px 14px;
    border-radius:14px;
    border:1px solid #e6e6e6;
    min-width:240px;
    width:100%;
    max-width:360px;
  }
  .collapsed{display:none}

  @media (max-width:840px){
    .site-header{grid-template-columns:1fr;}
    .site-header h1{text-align:center;}
    .header-controls{justify-content:center;}
    .controls{justify-content:center;}
    .tabs{justify-content:center;}
  }
  @media (max-width:560px){
    .site-header h1{font-size:1.6rem;}
    .search-input{min-width:180px;}
  }
</style>

<div class="site-header">
  <h1>Moje Przepisy</h1>
  <div class="header-controls">
    <div class="controls">
      <input id="search" class="search-input" type="search" placeholder="Szukaj przepisów..." aria-label="Szukaj przepisów">
    </div>
    <div class="tabs" role="tablist" aria-label="Filtry kategorii">
      <button data-filter="all" class="active">Wszystkie</button>
      <button data-filter="mięsne">Mięsne</button>
      <button data-filter="vege">Vege</button>
      <button data-filter="ryby">Ryby</button>
      <button data-filter="ostre">Ostre</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const tabs = document.querySelectorAll('.tabs button');
  const searchInput = document.querySelector('#search');
  const cardsGrid = document.querySelector('.cards-grid');

  function getCards(){
    return cardsGrid ? Array.from(cardsGrid.querySelectorAll('.card')) : [];
  }

  let activeCategory = 'all';

  function applyFilters(){
    const q = (searchInput && searchInput.value || '').toLowerCase().trim();
    const cards = getCards();
    cards.forEach(card => {
      const text = (card.textContent || '').toLowerCase();
      const tagEl = card.querySelector('.card-tag');
      const tagText = tagEl ? (tagEl.textContent || '').toLowerCase() : '';

      const matchesSearch = q === '' || text.includes(q);
      const matchesCategory = activeCategory === 'all' || tagText.includes(activeCategory);

      if(matchesSearch && matchesCategory){
        card.style.display = '';
      } else {
        card.style.display = 'none';
      }
    });
  }

  tabs.forEach(t => t.addEventListener('click', ()=>{
    tabs.forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    activeCategory = t.getAttribute('data-filter') || 'all';
    applyFilters();
  }));

  if(searchInput){
    let debounce;
    searchInput.addEventListener('input', ()=>{
      clearTimeout(debounce);
      debounce = setTimeout(()=>applyFilters(), 120);
    });
  }

  // run once at start
  applyFilters();
});
</script>

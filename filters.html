<!doctype html>
<style>
  .header-controls{
    display:flex;
    flex-wrap:nowrap;
    gap:12px;
    justify-content:space-between;
    align-items:center;
  }
  .tabs{
    display:flex;
    gap:14px;
    flex-wrap:nowrap;
    align-items:center;
    justify-content:flex-end;
    overflow-x:auto;
    padding-bottom:2px;
  }
  .tabs::after {
    content: '';
    flex: 1;
    min-width: 0;
  }
  .tabs button{
    background:none;
    border:none;
    padding:8px 12px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    color:#3a3a3a;
    transition:background-color .2s, color .2s;
    white-space:nowrap;
  }
  .tabs button.active,
  .tabs button:hover{
    color:var(--accent,#007acc);
    background:rgba(0,122,204,.12);
  }
  .controls{
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:flex-end;
    min-width:0;
    flex:0 1 auto;
  }

  .tabs button.active {
    background: rgba(0, 122, 204, 0.14);
  }
  .search-input{
    padding:10px 14px;
    border-radius:14px;
    border:1px solid #e6e6e6;
    min-width:240px;
    width:100%;
    max-width:360px;
  }
  .collapsed{display:none}

  @media (max-width:840px){
    .header-controls{flex-wrap:wrap;justify-content:center;}
    .controls{justify-content:center;width:100%;}
    .tabs{justify-content:center;overflow-x:auto;}
  }
  @media (max-width:560px){
    .search-input{min-width:180px;}
  }
</style>


<div class="header-controls">
  <div class="tabs" role="tablist" aria-label="Filtry kategorii">
    <button data-filter="🌱">🌱 Wege</button>
    <button data-filter="🐟">🐟 Ryba</button>
    <button data-filter="🐔">🐔 Kurczak</button>
    <button data-filter="🦆">🦆 Kaczka</button>
    <button data-filter="🐖">🐖 Wieprzowina</button>
    <button data-filter="🥩">🥩 Wołowina</button>
    <button data-filter="🦐">🦐 Owoce morza</button>
    <button data-filter="🔥">🔥 Ostro</button>
    <button data-filter="all">Wszystkie</button>
  </div>
    <div class="controls">
    <input id="search" class="search-input" type="search" placeholder="Szukaj przepisów..." aria-label="Szukaj przepisów">
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const tabs = Array.from(document.querySelectorAll('.tabs button'));
  const searchInput = document.querySelector('#search');
  const cardsGrid = document.querySelector('.cards-grid');
  const allButton = tabs.find(t => t.dataset.filter === 'all');

  function getCards() {
    return cardsGrid ? Array.from(cardsGrid.querySelectorAll('.card')) : [];
  }

  function getActiveFilters() {
    return tabs
      .filter(tab => tab.classList.contains('active') && tab.dataset.filter !== 'all')
      .map(tab => tab.dataset.filter);
  }

  function applyFilters() {
    const q = (searchInput && searchInput.value || '').toLowerCase().trim();
    const activeFilters = getActiveFilters();

    getCards().forEach(card => {
      const title = (card.dataset.title || '').toLowerCase();
      const category = (card.dataset.category || '').toLowerCase();
      const emojiText = (card.dataset.emoji || '').toLowerCase();
      const searchableText = `${title} ${category} ${emojiText}`;

      const matchesSearch = q === '' || searchableText.includes(q);
      const matchesFilters = activeFilters.length === 0 || activeFilters.some(filter => emojiText.includes(filter));

      card.style.display = matchesSearch && matchesFilters ? '' : 'none';
    });
  }

  function updateAllButtonState() {
    const activeNonAll = tabs.some(tab => tab.dataset.filter !== 'all' && tab.classList.contains('active'));
    if (allButton) {
      allButton.classList.toggle('active', !activeNonAll);
    }
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const filterValue = tab.dataset.filter || 'all';

      if (filterValue === 'all') {
        tabs.forEach(t => t.classList.toggle('active', t === tab));
      } else {
        tab.classList.toggle('active');
      }

      updateAllButtonState();
      applyFilters();
    });
  });

  if (searchInput) {
    let debounce;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(applyFilters, 120);
    });
  }

  if (allButton) {
    allButton.classList.add('active');
  }

  applyFilters();
});
</script>

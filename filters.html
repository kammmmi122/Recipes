<!doctype html>
<style>
  .header-controls{
    display:flex;
    flex-wrap:nowrap;
    gap:12px;
    justify-content:space-between;
    align-items:center;
  }
  .tabs{
    display:flex;
    gap:14px;
    flex-wrap:nowrap;
    align-items:center;
    justify-content:flex-end;
    overflow-x:auto;
    padding-bottom:2px;
  }
  .tabs::after {
    content: '';
    flex: 1;
    min-width: 0;
  }
  .tabs button{
    background:none;
    border:none;
    padding:8px 12px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    color:#3a3a3a;
    transition:background-color .2s, color .2s;
    white-space:nowrap;
  }
  .tabs button.active,
  .tabs button:hover{
    color:var(--accent,#007acc);
    background:rgba(0,122,204,.1);
  }
  .controls{
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:flex-end;
    min-width:0;
    flex:0 1 auto;
  }
  .search-input{
    padding:10px 14px;
    border-radius:14px;
    border:1px solid #e6e6e6;
    min-width:240px;
    width:100%;
    max-width:360px;
  }
  .collapsed{display:none}

  @media (max-width:840px){
    .header-controls{flex-wrap:wrap;justify-content:center;}
    .controls{justify-content:center;width:100%;}
    .tabs{justify-content:center;overflow-x:auto;}
  }
  @media (max-width:560px){
    .search-input{min-width:180px;}
  }
</style>


<div class="header-controls">
  <div class="tabs" role="tablist" aria-label="Filtry kategorii">
    <button data-filter="🌱">🌱 Wege</button>
    <button data-filter="🐟">🐟 Ryba</button>
    <button data-filter="🐔">🐔 Kurczak</button>
    <button data-filter="🦆">🦆 Kaczka</button>
    <button data-filter="🐖">🐖 Wieprzowina</button>
    <button data-filter="🥩">🥩 Wołowina</button>
    <button data-filter="🦐">🦐 Owoce morza</button>
    <button data-filter="🔥">🔥 Ostro</button>
    <button data-filter="all">Wszystkie</button>
  </div>
    <div class="controls">
    <input id="search" class="search-input" type="search" placeholder="Szukaj przepisów..." aria-label="Szukaj przepisów">
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const tabs = document.querySelectorAll('.tabs button');
  const searchInput = document.querySelector('#search');
  const cardsGrid = document.querySelector('.cards-grid');

  function getCards(){
    return cardsGrid ? Array.from(cardsGrid.querySelectorAll('.card')) : [];
  }

  let activeCategory = 'all';

  function applyFilters(){
    const q = (searchInput && searchInput.value || '').toLowerCase().trim();
    const cards = getCards();
    cards.forEach(card => {
      const text = (card.textContent || '').toLowerCase();
      const emojiText = (card.dataset.emoji || '').toLowerCase();

      const matchesSearch = q === '' || text.includes(q);
      const matchesCategory = activeCategory === 'all' || emojiText.includes(activeCategory);

      if(matchesSearch && matchesCategory){
        card.style.display = '';
      } else {
        card.style.display = 'none';
      }
    });
  }

  tabs.forEach(t => t.addEventListener('click', ()=>{
    tabs.forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    activeCategory = t.getAttribute('data-filter') || 'all';
    applyFilters();
  }));

  if(searchInput){
    let debounce;
    searchInput.addEventListener('input', ()=>{
      clearTimeout(debounce);
      debounce = setTimeout(()=>applyFilters(), 120);
    });
  }

  // run once at start
  applyFilters();
});
</script>
